  deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Deploy Application
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }} # Optional: set this if you store it in GitHub Secrets
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "Deploying production build..."
            vercel --prod --confirm --project $VERCEL_PROJECT_ID
          else
            echo "Deploying preview build..."
            vercel --confirm --project $VERCEL_PROJECT_ID
          fi
